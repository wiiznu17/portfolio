<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient
      id="botBody"
      x1="0%"
      y1="0%"
      x2="100%"
      y2="100%"
    >
      <stop
        offset="0%"
        stop-color="#eff6ff"
      />
      <stop
        offset="100%"
        stop-color="#93c5fd"
      />
    </linearGradient>
    <linearGradient
      id="visorGrad"
      x1="0%"
      y1="0%"
      x2="100%"
      y2="100%"
    >
      <stop
        offset="0%"
        stop-color="#1e293b"
      />
      <stop
        offset="100%"
        stop-color="#0f172a"
      />
    </linearGradient>
    <linearGradient
      id="eyeGlow"
      x1="0%"
      y1="0%"
      x2="100%"
      y2="0%"
    >
      <stop
        offset="0%"
        stop-color="#38bdf8"
      />
      <stop
        offset="50%"
        stop-color="#bae6fd"
      />
      <stop
        offset="100%"
        stop-color="#38bdf8"
      />
    </linearGradient>
  </defs>

  <!-- Antenna -->
  <line
    x1="50"
    y1="20"
    x2="50"
    y2="10"
    stroke="#94a3b8"
    stroke-width="3"
    stroke-linecap="round"
  />
  <circle
    cx="50"
    cy="8"
    r="4"
    fill="#fbbf24"
  />

  <!-- Main Body/Head -->
  <rect
    x="25"
    y="20"
    width="50"
    height="45"
    rx="12"
    fill="url(#botBody)"
    stroke="#ffffff"
    stroke-width="2"
  />
  <rect
    x="25"
    y="20"
    width="50"
    height="45"
    rx="12"
    fill="none"
    stroke="#60a5fa"
    stroke-width="1"
    transform="translate(1, 1)"
    opacity="0.5"
  />

  <!-- Visor -->
  <rect
    x="30"
    y="32"
    width="40"
    height="18"
    rx="6"
    fill="url(#visorGrad)"
    stroke="#334155"
    stroke-width="2"
  />
  <path
    d="M 32 35 Q 40 33 48 35"
    fill="none"
    stroke="#ffffff"
    stroke-width="1.5"
    opacity="0.3"
    stroke-linecap="round"
  />

  <!-- Glowing Eyes -->
  <rect
    x="36"
    y="38"
    width="28"
    height="6"
    rx="3"
    fill="url(#eyeGlow)"
    style="filter: drop-shadow(0 0 3px #38bdf8);"
  />

  <!-- Feet -->
  <rect
    x="32"
    y="65"
    width="12"
    height="12"
    rx="4"
    fill="#64748b"
  />
  <rect
    x="56"
    y="65"
    width="12"
    height="12"
    rx="4"
    fill="#64748b"
  />
</svg>
